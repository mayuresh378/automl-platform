services:
  # Backend API (FastAPI + Uvicorn via Docker)
  - type: web
    name: automl-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: automl-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: https://automl-frontend.onrender.com,https://automl-api.onrender.com
    healthCheckPath: /
    autoDeploy: true

  # Frontend (React static site)
  - type: web
    name: automl-frontend
    runtime: static
    repo: https://github.com/mayuresh378/automl-platform
    branch: main
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      - key: VITE_API_URL
        value: https://automl-api.onrender.com/api/v1
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    autoDeploy: true

databases:
  - name: automl-db
    plan: free
    databaseName: automl
    user: automl
    ipAllowList: []
